<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Card Memory Game</h1>
    <p>Click on the cards to flip them. Try to find all the matching pairs!</p>
    <div>
        <label for="difficulty-select">Select Difficulty:</label>
        <select id="difficulty-select">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>
    </div>
    <main id="game" role="main">
        <p>Matches found: <span id="matches">0</span></p>
        <div>
            <button id="reset-game-button">Reset Game</button>
        </div>
        <div id="cards">
        </div>

    </main>

    <script src="script.js" defer></script>
</body>

</html>
