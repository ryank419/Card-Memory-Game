<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Card Memory Game</h1>
    <p>Click on the cards to flip them. Try to find all the matching pairs!</p>
    <div id="lower-left-dock">
        <div class="volume-control">
            <div class="volume-panel">
                <input id="sfx-volume-slider" type="range" class="volume-slider" min="0" max="1" step="0.05">
            </div>
            <img id="sfx-icon" src="images/ui/sfx-icon.png" class="volume-icon">
        </div>

        <div class="volume-control">
            <div class="volume-panel">
                <input id="music-volume-slider" type="range" class="volume-slider" min="0" max="1" step="0.05">
            </div>
            <img id="music-icon" src="images/ui/music-icon.png" class="volume-icon">
        </div>
    </div>
    <div id="difficulty-buttons">
        <button class="difficulty-button" data-difficulty="easy">Easy</button>
        <button class="difficulty-button" data-difficulty="medium">Medium</button>
        <button class="difficulty-button" data-difficulty="hard">Hard</button>
        <button class="difficulty-button" data-difficulty="testing">Testing</button>
    </div>
    <main id="game" role="main">
        <div id="toolbar">
            <p>
                <span id="timer">00:00.000</span>
            </p>
            <p style="display: flex; justify-content: center;">
                x<span id="combo">0</span>
            </p>
            <p style="display: flex; justify-content: right;">
                <span id="matches">0</span> / <span id="total-pairs">0</span>
            </p>
        </div>
        <div id="cards">
        </div>
    </main>

    <script src="script.js" defer></script>
</body>

</html>
