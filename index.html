<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Card Memory Game</h1>
    <p>Click on the cards to flip them. Try to find all the matching pairs!</p>
    <div id="lower-left-dock">
        <div>
            <img id="sfx-icon" src="images/sfx-icon.png" class="volume-icon">
            <img id="music-icon" src="images/music-icon.png" class="volume-icon">
        </div>
    </div>
    <div id="difficulty-buttons">
        <button class="difficulty-button" data-difficulty="easy">Easy</button>
        <button class="difficulty-button" data-difficulty="medium">Medium</button>
        <button class="difficulty-button" data-difficulty="hard">Hard</button>
        <button class="difficulty-button" data-difficulty="testing">Testing</button>
    </div>
    <main id="game" role="main">
        <div id="toolbar">
            <p>
                <span>Matches: <span id="matches">0</span></span>
            </p>
            <p>|</p>
            <p>
                <span>Time: <span id="minutes">00</span>:<span id="seconds">00</span></span>
            </p>
        </div>
        <div id="cards">
        </div>

    </main>

    <script src="script.js" defer></script>
</body>

</html>
